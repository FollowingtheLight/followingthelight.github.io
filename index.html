<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>恩典在召唤</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; }
        h1 { color: #333; }
        .post-item { margin: 30px auto; max-width: 700px; text-align: left; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .post-item h2 a { color: #0366d6; text-decoration: none; }
        .post-item span { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    {% for post in site.posts %}
      <div class="post-item">
        <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        {{ post.excerpt }}
      </div>
    {% endfor %}
</body>
</html>
